# Execução local integrada (dev/local) — Stories 1.1 e 1.2.
# Não usar como configuração de produção sem revisão (segredos via cofre/Coolify).
services:
  db:
    image: postgres:16-alpine
    # Teto de recursos por serviço (staging provisório coabitando com outra stack no mesmo
    # host). Docker Compose v2 honra `deploy.resources.limits` fora do Swarm. Somados, os três
    # serviços ficam sob 4 GB / 2 vCPU — o orçamento acordado para o CRM neste host compartilhado.
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.75'
    environment:
      # Credenciais vindas do AMBIENTE, sem valor padrão (`:?`). Um default silencioso é
      # credencial insegura: o ambiente que esquece a variável não falha — ele sobe com uma
      # senha conhecida e versionada. A Constitution VI proíbe credencial padrão, e o
      # projeto já trata configuração ausente como falha honesta (`CORS_ALLOWED_ORIGINS`,
      # `DATABASE_URL`). Aqui vale o mesmo: sem a variável, o `compose up` para e diz qual.
      # Para desenvolvimento, `cp .env.example .env` já preenche as três.
      # O superusuário do container NUNCA é usado pela aplicação: os papéis
      # `giraffe_migrator` e `giraffe_app` são criados no bootstrap (AD-6).
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD (ver .env.example)}
      POSTGRES_DB: giraffe
      # Consumidas pelo script de bootstrap dos papéis.
      MIGRATOR_PASSWORD: ${MIGRATOR_PASSWORD:?defina MIGRATOR_PASSWORD (ver .env.example)}
      APP_PASSWORD: ${APP_PASSWORD:?defina APP_PASSWORD (ver .env.example)}
    # Sem `ports` no compose base — decisão de deploy. No Coolify (que chama `-f docker-compose.yml`)
    # o banco é alcançado só pela rede do Compose (`db:5432`); publicar porta de host num host
    # compartilhado é desnecessário e colide. A publicação em loopback para dev/CI vive em
    # `docker-compose.override.yml` (auto-carregado pelo `docker compose` local/CI, ignorado pelo Coolify).
    volumes:
      - db-data:/var/lib/postgresql/data
      # Bootstrap dos papéis (roda uma vez, como superusuário, antes das migrations).
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
      # O SQL de papéis é o MESMO usado no deploy — versionado junto das migrations.
      # O script de init só o executa; não guarda uma segunda cópia.
      - ./apps/api/prisma/bootstrap:/bootstrap:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d giraffe']
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Teto da API no staging provisório (ver nota no serviço `db`).
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.75'
    environment:
      NODE_ENV: production
      API_PORT: '3001'
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
      # Papel de runtime: SEM BYPASSRLS, não proprietário das tabelas (AD-6).
      # A credencial do MIGRATOR (dono do schema) NÃO é exposta aqui — de propósito: o
      # runtime não pode ter em mãos um papel capaz de ignorar as policies.
      DATABASE_URL: postgresql://giraffe_app:${APP_PASSWORD:?defina APP_PASSWORD (ver .env.example)}@db:5432/giraffe?schema=public

      # Story 1.4 — autenticação e antiabuso. Sem valor padrão (`:?`), pelo mesmo motivo das senhas
      # do banco: um default silencioso é um segredo público. A API já recusa subir sem elas
      # (fail-fast, `getEnv()`); o `:?` faz o próprio `compose up` parar antes, dizendo qual falta.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?defina BETTER_AUTH_SECRET (ver .env.example)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      LOGIN_HMAC_SECRET: ${LOGIN_HMAC_SECRET:?defina LOGIN_HMAC_SECRET (ver .env.example)}
      LOGIN_HMAC_KEY_VERSION: ${LOGIN_HMAC_KEY_VERSION:-1}

      # Rotação do HMAC: presentes só durante a janela de sobreposição.
      # Ver docs/04-operacao/rotacao-do-segredo-hmac.md
      LOGIN_HMAC_PREVIOUS_SECRET: ${LOGIN_HMAC_PREVIOUS_SECRET:-}
      LOGIN_HMAC_PREVIOUS_KEY_VERSION: ${LOGIN_HMAC_PREVIOUS_KEY_VERSION:-}

      # VAZIO por padrão: sem proxy confiável declarado, o IP vem do SOCKET e o
      # `X-Forwarded-For` do cliente é ignorado (ver kernel/auth/client-ip.ts).
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      # Este Compose é execução LOCAL, exposição DIRETA (sem proxy reverso na frente). Em produção,
      # `TRUSTED_PROXY_IPS` vazio SEM este opt-in falha no boot — para que ninguém suba atrás de um
      # proxy com o G2 colapsado num balde único por esquecimento. Aqui a exposição direta é real e
      # declarada. A topologia com o proxy do Coolify é validada no gate de staging (débito D-01).
      ALLOW_DIRECT_EXPOSURE: ${ALLOW_DIRECT_EXPOSURE:-true}
    # Sem `ports` no base (ver nota no serviço `db`): a API é interna, alcançada pela rede do
    # Compose. A publicação em loopback para dev/CI vive em `docker-compose.override.yml`.
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    # Teto da Web no staging provisório (ver nota no serviço `db`).
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      NODE_ENV: production
      # Server-side (container) alcança a API pela rede do Compose. Variável de
      # servidor (não NEXT_PUBLIC): não é exposta ao browser.
      API_BASE_URL: http://api:3001
      # Origem PÚBLICA da Web (a URL do browser). Atrás de proxy, `req.nextUrl.origin` é o bind
      # interno (0.0.0.0:3000) — o Origin do relay BFF e o fallback do CSRF usam ESTA variável, e
      # ela precisa constar em CORS_ALLOWED_ORIGINS da API. Sem default silencioso (`:?`): uma
      # origem errada quebra o login de forma opaca; melhor falhar no `up`, dizendo qual falta.
      WEB_PUBLIC_ORIGIN: ${WEB_PUBLIC_ORIGIN:?defina WEB_PUBLIC_ORIGIN (ver .env.example)}
    # Sem `ports` no base (ver nota no serviço `db`): o Traefik roteia o domínio para o container
    # pela rede docker. A publicação em loopback para dev/CI vive em `docker-compose.override.yml`.
    depends_on:
      - api

volumes:
  db-data:
