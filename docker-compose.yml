# Execução local integrada (dev/local) — Stories 1.1 e 1.2.
# Não usar como configuração de produção sem revisão (segredos via cofre/Coolify).
services:
  db:
    image: postgres:16-alpine
    # Teto de recursos por serviço (staging provisório coabitando com outra stack no mesmo
    # host). Docker Compose v2 honra `deploy.resources.limits` fora do Swarm. Somados, os três
    # serviços ficam sob 4 GB / 2 vCPU — o orçamento acordado para o CRM neste host compartilhado.
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.75'
    environment:
      # Credenciais vindas do AMBIENTE, sem valor padrão (`:?`). Um default silencioso é
      # credencial insegura: o ambiente que esquece a variável não falha — ele sobe com uma
      # senha conhecida e versionada. A Constitution VI proíbe credencial padrão, e o
      # projeto já trata configuração ausente como falha honesta (`CORS_ALLOWED_ORIGINS`,
      # `DATABASE_URL`). Aqui vale o mesmo: sem a variável, o `compose up` para e diz qual.
      # Para desenvolvimento, `cp .env.example .env` já preenche as três.
      # O superusuário do container NUNCA é usado pela aplicação: os papéis
      # `giraffe_migrator` e `giraffe_app` são criados no bootstrap (AD-6).
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD (ver .env.example)}
      POSTGRES_DB: giraffe
      # Consumidas pelo script de bootstrap dos papéis.
      MIGRATOR_PASSWORD: ${MIGRATOR_PASSWORD:?defina MIGRATOR_PASSWORD (ver .env.example)}
      APP_PASSWORD: ${APP_PASSWORD:?defina APP_PASSWORD (ver .env.example)}
    # Sem `ports` no compose base — decisão de deploy. No Coolify (que chama `-f docker-compose.yml`)
    # o banco é alcançado só pela rede do Compose (`db:5432`); publicar porta de host num host
    # compartilhado é desnecessário e colide. A publicação em loopback para dev/CI vive em
    # `docker-compose.override.yml` (auto-carregado pelo `docker compose` local/CI, ignorado pelo Coolify).
    volumes:
      - db-data:/var/lib/postgresql/data
      # Bootstrap dos papéis (roda uma vez, como superusuário, antes das migrations).
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
      # O SQL de papéis é o MESMO usado no deploy — versionado junto das migrations.
      # O script de init só o executa; não guarda uma segunda cópia.
      - ./apps/api/prisma/bootstrap:/bootstrap:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d giraffe']
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Teto da API no staging provisório (ver nota no serviço `db`).
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.75'
    environment:
      NODE_ENV: production
      API_PORT: '3001'
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
      # Papel de runtime: SEM BYPASSRLS, não proprietário das tabelas (AD-6).
      # A credencial do MIGRATOR (dono do schema) NÃO é exposta aqui — de propósito: o
      # runtime não pode ter em mãos um papel capaz de ignorar as policies.
      DATABASE_URL: postgresql://giraffe_app:${APP_PASSWORD:?defina APP_PASSWORD (ver .env.example)}@db:5432/giraffe?schema=public

      # Story 1.4 — autenticação e antiabuso. Sem valor padrão (`:?`), pelo mesmo motivo das senhas
      # do banco: um default silencioso é um segredo público. A API já recusa subir sem elas
      # (fail-fast, `getEnv()`); o `:?` faz o próprio `compose up` parar antes, dizendo qual falta.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?defina BETTER_AUTH_SECRET (ver .env.example)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      LOGIN_HMAC_SECRET: ${LOGIN_HMAC_SECRET:?defina LOGIN_HMAC_SECRET (ver .env.example)}
      LOGIN_HMAC_KEY_VERSION: ${LOGIN_HMAC_KEY_VERSION:-1}

      # Rotação do HMAC: presentes só durante a janela de sobreposição.
      # Ver docs/04-operacao/rotacao-do-segredo-hmac.md
      LOGIN_HMAC_PREVIOUS_SECRET: ${LOGIN_HMAC_PREVIOUS_SECRET:-}
      LOGIN_HMAC_PREVIOUS_KEY_VERSION: ${LOGIN_HMAC_PREVIOUS_KEY_VERSION:-}

      # Hop Web→API autenticado (D-01). VAZIO = modo direto (dev/CI): a API resolve o IP pelo socket
      # + TRUSTED_PROXY_IPS. PREENCHIDO (staging/produção atrás do proxy do Coolify): a API passa a
      # EXIGIR a prova assinada na rota de auth — um X-Forwarded-For sem assinatura válida é recusado
      # (fail-closed), e o IP do cliente vem do envelope assinado. O MESMO segredo vai à Web (abaixo).
      # Segredo de SERVIDOR, jamais NEXT_PUBLIC_/log. Rotação com janela: PREVIOUS_* (ver rotacao-hmac).
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      INTERNAL_HMAC_KEY_VERSION: ${INTERNAL_HMAC_KEY_VERSION:-1}
      INTERNAL_HMAC_PREVIOUS_SECRET: ${INTERNAL_HMAC_PREVIOUS_SECRET:-}
      INTERNAL_HMAC_PREVIOUS_KEY_VERSION: ${INTERNAL_HMAC_PREVIOUS_KEY_VERSION:-}

      # VAZIO por padrão: sem proxy confiável declarado, o IP vem do SOCKET e o
      # `X-Forwarded-For` do cliente é ignorado (ver kernel/auth/client-ip.ts).
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      # Este Compose é execução LOCAL, exposição DIRETA (sem proxy reverso na frente). Em produção,
      # `TRUSTED_PROXY_IPS` vazio SEM este opt-in falha no boot — para que ninguém suba atrás de um
      # proxy com o G2 colapsado num balde único por esquecimento. Aqui a exposição direta é real e
      # declarada. A topologia com o proxy do Coolify é validada no gate de staging (débito D-01).
      ALLOW_DIRECT_EXPOSURE: ${ALLOW_DIRECT_EXPOSURE:-true}
    # Sem `ports` no base (ver nota no serviço `db`): a API é interna, alcançada pela rede que o
    # Coolify gerencia para o stack, pelo nome de serviço `api`. A publicação em loopback para
    # dev/CI vive em `docker-compose.override.yml`. Sem `networks:` custom (ver nota no fim do
    # arquivo): db/api ficam privados por NÃO terem domínio, porta publicada nem label Traefik.
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    # Teto da Web no staging provisório (ver nota no serviço `db`).
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      NODE_ENV: production
      # Server-side (container) alcança a API pela rede que o Coolify gerencia para o stack, pelo
      # nome de serviço `api`. Variável de servidor (não NEXT_PUBLIC). No padrão nativo o IP da Web
      # é DINÂMICO (muda a cada recriação de container) — por isso a confiança da API não pode mais
      # depender de um IP fixo dela em TRUSTED_PROXY_IPS; a substituição por um hop Web→API
      # autenticado (HMAC) é o débito D-01 (tech story própria — ver nota de TRUSTED_PROXY_IPS).
      API_BASE_URL: http://api:3001
      # Origem PÚBLICA da Web (a URL do browser). Atrás de proxy, `req.nextUrl.origin` é o bind
      # interno (0.0.0.0:3000) — o Origin do relay BFF e o fallback do CSRF usam ESTA variável, e
      # ela precisa constar em CORS_ALLOWED_ORIGINS da API. Sem default silencioso (`:?`): uma
      # origem errada quebra o login de forma opaca; melhor falhar no `up`, dizendo qual falta.
      WEB_PUBLIC_ORIGIN: ${WEB_PUBLIC_ORIGIN:?defina WEB_PUBLIC_ORIGIN (ver .env.example)}

      # Hop Web→API autenticado (D-01): a Web ASSINA o IP do cliente (validado do X-Forwarded-For do
      # Traefik) num cabeçalho interno por requisição. MESMO segredo/versão da API. Vazio = modo direto
      # (dev): a Web manda o IP como X-Forwarded-For cru. Segredo de SERVIDOR — jamais NEXT_PUBLIC_.
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:-}
      INTERNAL_HMAC_KEY_VERSION: ${INTERNAL_HMAC_KEY_VERSION:-1}
    # Sem `ports` no base (ver nota no serviço `db`): o Traefik roteia o domínio para o container
    # pela rede que o Coolify gerencia (a Web é o ÚNICO serviço com domínio). A publicação em
    # loopback para dev/CI vive em `docker-compose.override.yml`.
    depends_on:
      - api

volumes:
  db-data:

# SEM redes customizadas — PADRÃO NATIVO do Coolify (decisão do dono, 2026-07-17).
#
# **Por que abandonamos a rede custom.** As tentativas anteriores (`interna` bridge comum, depois
# `privada` `internal: true`, PR #84) declaravam rede própria para forçar isolamento e um IP fixo
# da Web para `TRUSTED_PROXY_IPS`. A documentação oficial do Coolify (v4, build pack Docker Compose
# — "Do Not Define Custom Networks") desaconselha isso EXPLICITAMENTE: redes customizadas levam o
# Traefik a escolher o IP de container ERRADO de forma NÃO determinística, causando indisponibilidade
# intermitente por HTTPS (504/gateway-timeout). Num host que COABITA com o Chatwoot, esse risco não
# se justifica. Convergimos com a doc: o Coolify cria e gerencia UMA rede para o stack, à qual o
# reverse proxy é conectado, e os serviços se falam pelo nome (`db`, `api`, `web`).
#
# **Como db/api ficam privados no padrão nativo:** por AUSÊNCIA de superfície pública, não por rede
# separada — nenhum domínio, nenhuma porta publicada (o `ports` de loopback vive só no override de
# dev/CI, que o Coolify não carrega) e nenhuma regra/label Traefik. Só a `web` tem domínio, então só
# ela é roteável de fora; a `api` é alcançada apenas pelo BFF da Web (`API_BASE_URL=http://api:3001`).
#
# **Risco residual ACEITO e documentado:** o `coolify-proxy` tem CONECTIVIDADE de rede até `db`/`api`
# (está na mesma rede gerenciada do stack), mas NÃO há ROTA PÚBLICA para eles (sem domínio/porta/label).
# Isolamento de rede em nível de L3 seria a topologia multi-rede — rejeitada pelo custo de HTTPS
# intermitente acima. A prova de fechamento externo (3001/5432/5434 inacessíveis de fora) é feita por
# teste, não por topologia.
#
# **TRUSTED_PROXY_IPS / D-01:** sem IP fixo da Web, a confiança da API não pode depender de um endereço
# estático (ele muda a cada recriação de container). NÃO afrouxar a variável nem confiar cegamente em
# XFF: a substituição da dependência de IP por um hop Web→API AUTENTICADO (headers internos assinados
# com HMAC + timestamp + dados da requisição, segredo separado e rotacionável, nunca exposto ao browser)
# é o débito D-01, tratado em tech story própria — ver
# `_bmad-output/implementation-artifacts/tech-d01-hop-web-api-autenticado.md`.
