# Override de DEV/CI ISOLADO — storage (MinIO) + antivírus (ClamAV) para a capacidade de arquivos (3.7).
#
# **NÃO é auto-carregado.** Diferente do `docker-compose.override.yml` (loopback, auto-carregado), este
# arquivo só entra com `-f` EXPLÍCITO — na suíte de arquivos local e no CI:
#
#     docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.dev-files.yml up -d minio clamav
#
# **AD-32 — jamais no host do Chatwoot.** MinIO/ClamAV são serviços de DEV/CI apenas; o provisionamento de
# storage/antivírus de PRODUÇÃO é decisão de operação, fora do escopo. O Coolify invoca só
# `-f docker-compose.yml`, então NUNCA carrega este override — estes serviços não sobem no host compartilhado.
#
# Binds em 127.0.0.1 (acessíveis só pelo próprio host). Limites explícitos de CPU/RAM (host compartilhado).
services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      # Credenciais de DEV/CI — sem default silencioso em produção (estes serviços não existem em prod).
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-giraffe_files}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-giraffe_files_dev_secret}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # One-shot: cria o bucket privado e garante que NÃO há política pública (buckets privados — AD-27).
  minio-setup:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-giraffe_files}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-giraffe_files_dev_secret}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-giraffe-files}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/\"$$STORAGE_BUCKET\" &&
      mc anonymous set none local/\"$$STORAGE_BUCKET\" &&
      echo 'bucket privado pronto'
      "

  clamav:
    # Variante `_base`: usa a base de assinaturas EMBUTIDA na imagem (sem `freshclam` no boot) — boot rápido e
    # determinístico para dev/CI (o download da base por freshclam é lento e flaky). O canário EICAR ainda detecta
    # (a base embutida cobre a assinatura de teste). O gate de frescor (`CLAMAV_DB_MAX_AGE_HOURS`) é afrouxado no
    # CI (a base embutida é "velha" por construção) e a lógica de frescor real é provada no teste de unidade.
    image: clamav/clamav:1.4_base
    deploy:
      resources:
        limits:
          # ClamAV carrega a base de assinaturas em memória (~1.3 GB). Teto folgado só para dev/CI.
          memory: 2G
          cpus: '1.0'
    volumes:
      # clamd.conf com AlertExceedsMax yes + limites (fail-closed em "limite excedido").
      - ./docker/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - clamav-data:/var/lib/clamav
    ports:
      - '127.0.0.1:3310:3310'
    healthcheck:
      # Espera o clamd responder (base embutida carregada). start_period cobre a carga inicial da base.
      test: ['CMD-SHELL', 'clamdcheck.sh || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 10

volumes:
  minio-data:
  clamav-data:
