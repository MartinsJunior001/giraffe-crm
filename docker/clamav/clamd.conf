# clamd.conf — configuração do ClamAV para dev/CI (Story 3.7). Fail-closed por design (AD-28).
#
# Montado no container `clamav` do override `docker-compose.dev-files.yml` (dev/CI apenas — AD-32,
# NUNCA no host do Chatwoot). Os limites abaixo tornam "limite excedido" um BLOQUEIO, não um "OK por
# omissão": uma zip bomb ou um arquivo que estoura o teto de varredura é reportado como suspeito.

# Escuta TCP para o client `clamscan` (host:porta). O app fala com o clamd por TCP (INSTREAM).
TCPSocket 3310
TCPAddr 0.0.0.0

# UNIX socket INTERNO ao container — só para o healthcheck `clamdcheck.sh` (que usa o LocalSocket por padrão;
# sem ele o container fica `unhealthy` mesmo com o clamd respondendo por TCP, e o job de CI trava no
# `esperar_healthy`). NÃO é exposto ao host: nenhum volume/porta o publica (AD-32/AD-27 preservados) — vive
# dentro do container, invisível de fora.
LocalSocket /tmp/clamd.sock

# Log no stdout do container (sem arquivo; sem PII de conteúdo).
LogTime yes
LogClean no
Foreground yes

# ── Fail-closed: "limite excedido" = SUSPEITO, nunca CLEAN por omissão ──────────────────────────
# Sem isto, um arquivo que excede o teto de varredura passaria como limpo. Com AlertExceedsMax, o
# clamd sinaliza o excesso como detecção — o veredito composto do app o traduz em BLOCKED.
AlertExceedsMax yes

# Tetos de varredura (defesa contra zip bomb / descompressão explosiva). Conservadores para dev/CI.
MaxScanSize 100M
MaxFileSize 50M
MaxRecursion 10
MaxFiles 1000
MaxEmbeddedPE 10M

# Heurísticas de arquivos potencialmente perigosos.
AlertBrokenExecutables yes
AlertOLE2Macros yes

# Tamanho máximo por stream do INSTREAM (o client envia por stream). Acima disto, o clamd corta.
StreamMaxLength 50M
