      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

horia ou ideia para realização ou finalização do serviço.<\u002Fp>\n              <div class=\"cs-fld-input tall\">&nbsp;<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"cs-fld\">\n              <div class=\"cs-fld-head\">\n                <span class=\"fh-ic\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 3v4M16 3v4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span class=\"fh-title\">* Serviço finalizado<\u002Fspan>\n                <span class=\"spacer\"><\u002Fspan>\n                <span class=\"fh-act\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 20h4L18 10l-4-4L4 16v4Z\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"12\" cy=\"5\" r=\"1.6\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.6\"><\u002Fcircle><circle cx=\"12\" cy=\"19\" r=\"1.6\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"cs-fld-input\">Selecione uma data e hora<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ MODAL CONFIGURAR MOVER CARDS ============ -->\n  <div class=\"mv-overlay\" id=\"mvOverlay\">\n    <div class=\"mv-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"mvTitle\">\n      <div class=\"mv-head\">\n        <h2 id=\"mvTitle\">Configurar mover cards<\u002Fh2>\n        <p>Escolha para quais fases os cards podem ser movidos a partir de Solicitação em andamento.<\u002Fp>\n        <button class=\"mv-close\" id=\"mvClose\" aria-label=\"Fechar\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 6l12 12M18 6 6 18\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"mv-body\">\n        <div class=\"mv-row\"><span class=\"mv-name\">Solicitação de Serviço<\u002Fspan><button class=\"mv-toggle\" aria-pressed=\"true\" aria-label=\"Permitir mover para Solicitação de Serviço\"><\u002Fbutton><\u002Fdiv>\n        <div class=\"mv-row\"><span class=\"mv-name\">Solicitação em andamento<\u002Fspan><span class=\"mv-current\">Fase atual<\u002Fspan><\u002Fdiv>\n        <div class=\"mv-row\"><span class=\"mv-name\">Análise do Gestor Lider<\u002Fspan><button class=\"mv-toggle\" aria-pressed=\"true\" aria-label=\"Permitir mover para Análise do Gestor Lider\"><\u002Fbutton><\u002Fdiv>\n        <div class=\"mv-row\"><span class=\"mv-name\">Serviço Reprovado<\u002Fspan><button class=\"mv-toggle\" aria-pressed=\"false\" aria-label=\"Permitir mover para Serviço Reprovado\"><\u002Fbutton><\u002Fdiv>\n        <div class=\"mv-row\"><span class=\"mv-name\">Serviço Aprovado<\u002Fspan><button class=\"mv-toggle\" aria-pressed=\"false\" aria-label=\"Permitir mover para Serviço Aprovado\"><\u002Fbutton><\u002Fdiv>\n        <div class=\"mv-row\"><span class=\"mv-name\">Solicitação Finalizada<\u002Fspan><button class=\"mv-toggle\" aria-pressed=\"true\" aria-label=\"Permitir mover para Solicitação Finalizada\"><\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mv-foot\">\n        <button class=\"mv-btn cancel\" id=\"mvCancel\">Cancelar<\u002Fbutton>\n        <button class=\"mv-btn save\" id=\"mvSave\">Salvar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TOAST -->\n  <div class=\"toast\" id=\"toast\" role=\"status\" aria-live=\"polite\"><\u002Fdiv>\n\n  <!-- MODAL -->\n  <div class=\"overlay\" id=\"overlay\">\n    <div class=\"rf-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n      <div class=\"rf-head\">\n        <button class=\"rf-share\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M9 15 15 9M11 6l1-1a3.5 3.5 0 0 1 5 5l-1 1M13 18l-1 1a3.5 3.5 0 0 1-5-5l1-1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Compartilhar formulário<\u002Fbutton>\n        <button class=\"rf-edit\" id=\"rfEditGear\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-2.9-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.2-2.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 2.9-1.2V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.5 1Z\"><\u002Fpath><\u002Fsvg>Editar<\u002Fbutton>\n        <button class=\"rf-ic\" aria-label=\"Mais opções\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"12\" cy=\"5\" r=\"1.7\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.7\"><\u002Fcircle><circle cx=\"12\" cy=\"19\" r=\"1.7\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n        <button class=\"rf-ic\" id=\"modalClose\" aria-label=\"Fechar\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 6l12 12M18 6 6 18\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"rf-body\">\n        <div class=\"rf-title\">\n          <span class=\"rf-badge\" aria-hidden=\"true\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 7h6M4 12h16M14 17h6\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"14\" cy=\"7\" r=\"2.2\"><\u002Fcircle><circle cx=\"8\" cy=\"12\" r=\"2.2\"><\u002Fcircle><circle cx=\"10\" cy=\"17\" r=\"2.2\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n          <h2 id=\"modalTitle\">Contratos e Juridicos<\u002Fh2>\n        <\u002Fdiv>\n\n        <div class=\"rf-field\">\n          <div class=\"rf-label\">* Etiqueta<\u002Fdiv>\n          <button class=\"rf-link\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Adicionar etiqueta<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"rf-field\">\n          <div class=\"rf-label\">* Data de vencimento<\u002Fdiv>\n          <div class=\"rf-input\"><span class=\"ph\">DD / MM / AAAA , — : —<\u002Fspan><span class=\"cal\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 3v4M16 3v4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"rf-field\">\n          <div class=\"rf-label\">Conexão pipe criação de artes<\u002Fdiv>\n          <p class=\"rf-sub\">Conectar aqui o card de artes finalizadas<\u002Fp>\n          <button class=\"rf-link\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Nova tarefa<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"rf-field\">\n          <div class=\"rf-label\">* Empresa solicitante<\u002Fdiv>\n          <input class=\"rf-input\" id=\"f-empresa\" type=\"text\" placeholder=\"Digite aqui ...\" aria-label=\"Empresa solicitante\">\n        <\u002Fdiv>\n\n        <div class=\"rf-field\">\n          <div class=\"rf-label\">Arquivo para desenvolvimento<\u002Fdiv>\n          <p class=\"rf-sub\">Anexar arquivo para criação se necessário.<\u002Fp>\n          <button class=\"rf-link\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Adicionar novos arquivos<\u002Fbutton>\n        <\u002Fdiv>\n\n        <button class=\"rf-submit\" id=\"modalCreate\">Criar Solicitação<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n  (function () {\n    var toastEl = document.getElementById('toast');\n    var toastTimer;\n    function toast(msg) {\n      toastEl.textContent = msg;\n      toastEl.classList.add('show');\n      clearTimeout(toastTimer);\n      toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2200);\n    }\n\n    // Avatar do responsável no canto inferior direito do card\n    var avatarGrads = [\n      'linear-gradient(135deg,#f0a868,#c76b2e)',\n      'linear-gradient(135deg,#7fb3e8,#3f6fb0)',\n      'linear-gradient(135deg,#8fca9a,#4e8a5f)',\n      'linear-gradient(135deg,#c79ad8,#8a5aa8)',\n      'linear-gradient(135deg,#e89aa8,#b05a6f)'\n    ];\n    document.querySelectorAll('.card').forEach(function (card, i) {\n      var metrics = card.querySelector('.card-metrics');\n      if (!metrics) return;\n      var nameEl = card.querySelector('.field-value');\n      var name = nameEl ? nameEl.textContent.trim() : '';\n      var initials = name.split(/\\s+/).filter(Boolean).slice(0, 2)\n        .map(function (w) { return w.charAt(0).toUpperCase(); }).join('') || '?';\n      var av = document.createElement('span');\n      av.className = 'card-avatar';\n      av.style.background = avatarGrads[i % avatarGrads.length];\n      av.title = 'Responsável: ' + name;\n      av.setAttribute('aria-label', 'Responsável ' + name);\n      av.textContent = initials;\n      metrics.appendChild(av);\n    });\n\n    // 1. Card selection\n    document.querySelectorAll('.card').forEach(function (card) {\n      function open() {\n        document.querySelectorAll('.card.selected').forEach(function (c) { c.classList.remove('selected'); });\n        card.classList.add('selected');\n        openCardModal();\n      }\n      card.addEventListener('click', open);\n      card.addEventListener('keydown', function (e) {\n        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }\n      });\n    });\n\n    // Modal detalhe do card\n    var cardOverlay = document.getElementById('cardOverlay');\n    function openCardModal() {\n      cardOverlay.classList.add('show');\n      setTimeout(function () { document.getElementById('cardModalClose').focus(); }, 30);\n    }\n    function closeCardModal() { cardOverlay.classList.remove('show'); }\n    document.getElementById('cardModalClose').addEventListener('click', closeCardModal);\n    cardOverlay.addEventListener('click', function (e) { if (e.target === cardOverlay) closeCardModal(); });\n    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeCardModal(); });\n\n    // Histórico: mostrar mais / menos\n    var histToggle = document.getElementById('histToggle');\n    if (histToggle) {\n      histToggle.addEventListener('click', function () {\n        var detail = document.getElementById('histDetail');\n        var open = !detail.hasAttribute('hidden');\n        if (open) { detail.setAttribute('hidden', ''); } else { detail.removeAttribute('hidden'); }\n        document.getElementById('histToggleLabel').textContent = open ? 'Mostrar mais' : 'Mostrar menos';\n        document.getElementById('histChevron').style.transform = open ? '' : 'rotate(180deg)';\n      });\n    }\n\n    // Ícones de ação em cada header de fase (engrenagem, IA, +, menu)\n    var GEAR = '<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-2.9-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.2-2.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 2.9-1.2V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.5 1Z\"/><\u002Fsvg>';\n    var AI = '<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"m12 3 1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8L12 3ZM18 15l.9 2.1L21 18l-2.1.9L18 21l-.9-2.1L15 18l2.1-.9L18 15Z\" stroke-linejoin=\"round\"/><\u002Fsvg>';\n    var PLUS = '<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\" stroke-linecap=\"round\"/><\u002Fsvg>';\n    var KEBAB = '<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"12\" cy=\"5\" r=\"1.7\"/><circle cx=\"12\" cy=\"12\" r=\"1.7\"/><circle cx=\"12\" cy=\"19\" r=\"1.7\"/><\u002Fsvg>';\n    document.querySelectorAll('.column[data-phase]:not([data-phase=\"__newphase\"]) .col-header').forEach(function (h) {\n      var old = h.querySelector('.add');\n      if (old) old.remove();\n      var phase = h.closest('.column').getAttribute('data-phase');\n      var wrap = document.createElement('div');\n      wrap.className = 'col-actions';\n      wrap.innerHTML =\n        '<button class=\"act\" aria-label=\"Configurar fase ' + phase + '\">' + GEAR + '<\u002Fbutton>' +\n        '<button class=\"act ai\" aria-label=\"Agente de IA em ' + phase + '\">' + AI + '<\u002Fbutton>' +\n        '<button class=\"act\" aria-label=\"Adicionar card em ' + phase + '\">' + PLUS + '<\u002Fbutton>' +\n        '<button class=\"act\" aria-label=\"Mais opções de ' + phase + '\">' + KEBAB + '<\u002Fbutton>';\n      wrap.querySelectorAll('button').forEach(function (b) {\n        b.addEventListener('click', function (e) { e.stopPropagation(); });\n      });\n      var gearBtn = wrap.querySelector('button');\n      if (gearBtn) gearBtn.addEventListener('click', function () { openSettings({ type: 'phase', name: phase }); });\n      h.appendChild(wrap);\n    });\n\n    // Modal de configurações (engrenagem da fase)\n    var csOverlay = document.getElementById('csOverlay');\n    function openSettings(ctx) {\n      ctx = ctx || { type: 'phase', name: 'Solicitação em andamento' };\n      var titleEl = document.getElementById('csTitle');\n      var selEl = document.getElementById('csPhaseSel');\n      var boxEl = document.getElementById('csFaseBox');\n      if (ctx.type === 'form') {\n        titleEl.textContent = 'Configuração do formulário — Contratos e Juridicos';\n        if (selEl) selEl.firstChild.textContent = 'Formulário inicial ';\n        if (boxEl) boxEl.textContent = 'Formulário inicial';\n      } else {\n        titleEl.textContent = 'Configurações : ' + ctx.name;\n        if (selEl) selEl.firstChild.textContent = ctx.name + ' ';\n        if (boxEl) boxEl.textContent = ctx.name;\n      }\n      csOverlay.classList.add('show');\n      setTimeout(function () { document.getElementById('csClose').focus(); }, 30);\n    }\n    function closeSettings() { csOverlay.classList.remove('show'); }\n    document.getElementById('csClose').addEventListener('click', closeSettings);\n    var csFromCardGear = document.getElementById('csFromCardGear');\n    if (csFromCardGear) csFromCardGear.addEventListener('click', function () { openSettings({ type: 'phase', name: 'Solicitação em andamento' }); });\n    var rfEditGear = document.getElementById('rfEditGear');\n    if (rfEditGear) rfEditGear.addEventListener('click', function () { closeModal(); openSettings({ type: 'form' }); });\n    csOverlay.addEventListener('click', function (e) { if (e.target === csOverlay) closeSettings(); });\n    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSettings(); });\n\n    // Modal \"Configurar mover cards\"\n    var mvOverlay = document.getElementById('mvOverlay');\n    function openMove() { mvOverlay.classList.add('show'); setTimeout(function () { document.getElementById('mvClose').focus(); }, 30); }\n    function closeMove() { mvOverlay.classList.remove('show'); }\n    var cmConfigMove = document.getElementById('cmConfigMove');\n    if (cmConfigMove) cmConfigMove.addEventListener('click', openMove);\n    document.getElementById('mvClose').addEventListener('click', closeMove);\n    document.getElementById('mvCancel').addEventListener('click', closeMove);\n    document.getElementById('mvSave').addEventListener('click', function () { closeMove(); toast('Protótipo — configuração salva'); });\n    mvOverlay.addEventListener('click', function (e) { if (e.target === mvOverlay) closeMove(); });\n    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeMove(); });\n    document.querySelectorAll('.mv-toggle').forEach(function (t) {\n      t.addEventListener('click', function () {\n        t.setAttribute('aria-pressed', t.getAttribute('aria-pressed') === 'true' ? 'false' : 'true');\n      });\n    });\n\n    // 2. Phase header highlight\n    document.querySelectorAll('.col-header').forEach(function (h) {\n      h.addEventListener('click', function () {\n        document.querySelectorAll('.col-header').forEach(function (o) { o.style.background = ''; });\n        h.style.background = '#ececec';\n      });\n    });\n\n    // 3. Search filters cards by title\n    var search = document.getElementById('search');\n    search.addEventListener('input', function () {\n      var q = search.value.trim().toLowerCase();\n      document.querySelectorAll('.card').forEach(function (card) {\n        var t = (card.getAttribute('data-title') || '').toLowerCase();\n        card.style.display = (!q || t.indexOf(q) !== -1) ? '' : 'none';\n      });\n    });\n\n    // 4. Nova fase\n    document.getElementById('newPhaseBtn').addEventListener('click', function () {\n      toast('Protótipo — criação de Fase');\n    });\n\n    // 5. Nova solicitação modal\n    var overlay = document.getElementById('overlay');\n    function openModal() { overlay.classList.add('show'); setTimeout(function(){ var f=document.getElementById('f-empresa'); if(f) f.focus(); }, 30); }\n    function closeModal() { overlay.classList.remove('show'); }\n    document.getElementById('fab').addEventListener('click', openModal);\n    document.getElementById('modalClose').addEventListener('click', closeModal);\n    document.getElementById('modalCreate').addEventListener('click', function () {\n      closeModal(); toast('Protótipo — solicitação não é salva');\n    });\n    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });\n    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });\n\n    // 6. Horizontal scroll with shift+wheel convenience\n    var board = document.querySelector('.board-wrap');\n    board.addEventListener('wheel', function (e) {\n      if (e.shiftKey) { board.scrollLeft += e.deltaY; e.preventDefault(); }\n    }, { passive: false });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
