<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giraffe CRM — Recuperar senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #FFFFFF;
    --surface-soft: #FAFAFA;
    --hairline: #E5E5E5;
    --ink: #111111;
    --charcoal: #39393B;
    --mute: #707072;
    --primary: #FF7200;
    --primary-hover: #E5670A;
    --primary-soft: #FFF3E8;
    --green: #2E7D4F;
    --green-soft: #E9F4EE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter Tight", system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--surface-soft);
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  a { color: var(--primary); text-decoration: none; }
  a:hover { color: var(--primary-hover); }

  .fp-card {
    width: 100%; max-width: 520px;
    background: var(--canvas);
    border: 1px solid var(--hairline); border-radius: 12px;
    padding: 56px 48px;
    text-align: center;
  }
  .fp-title { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 12px; }
  .fp-sub { font-size: 15px; color: var(--mute); line-height: 1.55; margin-bottom: 32px; }
  .fp-sub strong { color: var(--ink); }

  .lg-field { position: relative; margin-bottom: 26px; text-align: left; }
  .lg-field label {
    position: absolute; top: -8px; left: 14px; padding: 0 6px;
    background: var(--canvas); font-size: 13px; font-weight: 500; color: var(--charcoal);
    white-space: nowrap; z-index: 2;
  }
  .lg-inputwrap {
    display: flex; align-items: center; gap: 10px;
    height: 56px; padding: 0 16px;
    border: 1px solid var(--hairline); border-radius: 8px;
    background: var(--canvas);
    transition: border-color .15s, box-shadow .15s;
  }
  .lg-inputwrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .lg-inputwrap svg { flex: 0 0 auto; color: var(--mute); }
  .lg-inputwrap input {
    flex: 1; min-width: 0; border: none; outline: none; background: none;
    font-family: inherit; font-size: 16px; color: var(--ink);
  }
  .lg-inputwrap input::placeholder { color: #A6A6AA; }

  .lg-submit {
    width: 100%; height: 56px; border: none; border-radius: 8px;
    background: var(--primary); color: #fff;
    font-family: inherit; font-size: 16px; font-weight: 500; cursor: pointer;
    transition: background .15s;
  }
  .lg-submit:hover { background: var(--primary-hover); }

  .fp-back {
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 28px; font-size: 14px; font-weight: 500;
    color: var(--charcoal);
  }
  .fp-back:hover { color: var(--ink); }

  /* sent state */
  .fp-mailic {
    width: 66px; height: 66px; border-radius: 50%;
    background: var(--green-soft); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .fp-backbtn {
    display: inline-flex; align-items: center; gap: 12px;
    height: 52px; padding: 0 26px;
    border: 1px solid var(--hairline); border-radius: 8px;
    background: var(--canvas); color: var(--ink);
    font-size: 15px; font-weight: 600;
  }
  .fp-backbtn:hover { color: var(--ink); background: var(--surface-soft); }
  .fp-resend { margin-top: 26px; font-size: 14px; color: var(--mute); }
  .fp-resend button {
    border: none; background: none; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--primary);
  }
  .fp-resend button:hover { color: var(--primary-hover); }

  [hidden] { display: none !important; }
</style>
</head>
<body>

  <!-- Etapa 1: pedir e-mail -->
  <div class="fp-card" id="fpForm" data-screen-label="Recuperar senha">
    <h1 class="fp-title">Recuperar senha</h1>
    <p class="fp-sub">Informe o e-mail da sua conta e enviaremos as instruções para redefinir a senha.</p>
    <form onsubmit="sendReset(); return false;">
      <div class="lg-field">
        <label for="email">E-mail</label>
        <div class="lg-inputwrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <input id="email" type="email" placeholder="giraffe@gmail.com" autocomplete="email" required />
        </div>
      </div>
      <button type="submit" class="lg-submit">Enviar instruções</button>
    </form>
    <a class="fp-back" href="login.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Voltar para o login
    </a>
  </div>

  <!-- Etapa 2: e-mail enviado -->
  <div class="fp-card" id="fpSent" data-screen-label="E-mail enviado" hidden>
    <span class="fp-mailic">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
    </span>
    <h1 class="fp-title">Verifique seu e-mail</h1>
    <p class="fp-sub">Enviamos as instruções de recuperação de senha para <strong id="sentEmail">giraffe@gmail.com</strong>. Confira a caixa de entrada e o spam.</p>
    <a class="fp-backbtn" href="login.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Voltar para o login
    </a>
    <p class="fp-resend">Não recebeu? <button type="button" onclick="sendReset()">Reenviar e-mail</button></p>
  </div>

  <script>
    function sendReset(){
      var email = document.getElementById('email').value || 'giraffe@gmail.com';
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('fpForm').hidden = true;
      document.getElementById('fpSent').hidden = false;
    }
  </script>
</body>
</html>
