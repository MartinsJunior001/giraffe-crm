<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giraffe CRM — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #FFFFFF;
    --surface-soft: #FAFAFA;
    --hairline: #E5E5E5;
    --ink: #111111;
    --charcoal: #39393B;
    --mute: #707072;
    --primary: #FF7200;
    --primary-hover: #E5670A;
    --primary-soft: #FFF3E8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter Tight", system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--canvas);
    -webkit-font-smoothing: antialiased;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
  }
  a { color: var(--primary); text-decoration: none; }
  a:hover { color: var(--primary-hover); }

  /* ===== LEFT: form ===== */
  .lg-left { display: flex; align-items: center; justify-content: center; padding: 40px; }
  .lg-form { width: 100%; max-width: 448px; }
  .lg-title { font-size: 40px; font-weight: 500; letter-spacing: -0.02em; text-align: center; margin-bottom: 48px; }

  .lg-field { position: relative; margin-bottom: 22px; }
  .lg-field label {
    position: absolute; top: -8px; left: 14px; padding: 0 6px;
    background: var(--canvas); font-size: 13px; font-weight: 500; color: var(--charcoal);
    white-space: nowrap; z-index: 2;
  }
  .lg-inputwrap {
    display: flex; align-items: center; gap: 10px;
    height: 56px; padding: 0 16px;
    border: 1px solid var(--hairline); border-radius: 8px;
    background: var(--canvas);
    transition: border-color .15s, box-shadow .15s;
  }
  .lg-inputwrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .lg-inputwrap svg { flex: 0 0 auto; color: var(--mute); }
  .lg-inputwrap input {
    flex: 1; min-width: 0; border: none; outline: none; background: none;
    font-family: inherit; font-size: 16px; color: var(--ink);
  }
  .lg-inputwrap input::placeholder { color: #A6A6AA; }
  .lg-eye { border: none; background: none; cursor: pointer; color: var(--mute); display: inline-flex; padding: 4px; }
  .lg-eye:hover { color: var(--charcoal); }

  .lg-row { display: flex; align-items: center; justify-content: space-between; margin: -6px 0 30px; }
  .lg-remember { display: inline-flex; align-items: center; gap: 9px; font-size: 14px; color: var(--mute); cursor: pointer; user-select: none; }
  .lg-remember input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
  .lg-forgot { font-size: 14px; font-weight: 500; }

  .lg-submit {
    width: 100%; height: 56px; border: none; border-radius: 8px;
    background: var(--primary); color: #fff;
    font-family: inherit; font-size: 16px; font-weight: 500; cursor: pointer;
    transition: background .15s;
  }
  .lg-submit:hover { background: var(--primary-hover); }

  .lg-foot { text-align: center; margin-top: 40px; font-size: 14px; color: var(--mute); }

  /* ===== RIGHT: brand panel ===== */
  .lg-right {
    position: relative; overflow: hidden;
    background: var(--primary);
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 56px;
    text-align: center;
  }
  .lg-right::before {
    content: ""; position: absolute; inset: 0;
    background: url("assets/images/crm-bg.jpg") center/cover no-repeat;
    opacity: 0.07; z-index: 0;
  }
  .lg-right > * { position: relative; z-index: 1; }
  .lg-art { width: 100px; max-width: 100px; }
  .lg-credit { font-size: 34px; font-weight: 500; margin-top: 8px; opacity: 0.92; }
  .lg-headline { font-size: 39px; font-weight: 500; line-height: 1.3; margin-top: 22px; max-width: 460px; }

  @media (max-width: 860px) {
    body { grid-template-columns: 1fr; }
    .lg-right { display: none; }
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#FF7200">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#FF7200"/>
      <rect x="140" y="300" width="380" height="60" rx="10" fill="#ffffff" opacity="0.9"/>
      <rect x="140" y="400" width="380" height="60" rx="10" fill="#ffffff" opacity="0.5"/>
      <rect x="140" y="500" width="380" height="60" rx="10" fill="#ffffff"/>
      <text x="880" y="420" font-family="sans-serif" font-size="70" fill="#ffffff" text-anchor="middle">Giraffe</text>
    </svg>
  </template>
  <div class="lg-left">
    <form class="lg-form" onsubmit="window.location.href='dashboard-home.html'; return false;">
      <h1 class="lg-title">Faça seu login</h1>

      <div class="lg-field">
        <label for="email">E-mail</label>
        <div class="lg-inputwrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <input id="email" type="email" placeholder="kaladin@gmail.com" autocomplete="email" />
        </div>
      </div>

      <div class="lg-field">
        <label for="senha">Senha</label>
        <div class="lg-inputwrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input id="senha" type="password" placeholder="sua senha" autocomplete="current-password" />
          <button type="button" class="lg-eye" aria-label="Mostrar senha" onclick="togglePw(this)">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="lg-row">
        <label class="lg-remember"><input type="checkbox" /> Lembrar de mim</label>
        <a href="forgot-password.html" class="lg-forgot">Esqueci minha senha</a>
      </div>

      <button type="submit" class="lg-submit">Entrar</button>
    </form>
  </div>

  <div class="lg-right">
    <img class="lg-art" src="assets/images/logo-rgiraffe.png" alt="Giraffe CRM" />
    <p class="lg-credit">Giraffe CRM</p>
    <h2 class="lg-headline">Um CRM com AI Agents completa e personalizável para seu negocio!</h2>
  </div>

  <script>
    function togglePw(btn){
      var input = document.getElementById('senha');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
